services:
  # 1. 哨兵閘道 (FastAPI)
  - type: web
    name: mirage-sentinel
    runtime: python
    plan: free
    region: singapore
    healthCheckPath: /healthz
    buildCommand: pip install -r requirements.txt
    startCommand: sh -c 'uvicorn main:app --host 0.0.0.0 --port ${PORT:-10000}'
    envVars:
      - key: API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: sentinel-cache
          property: connectionString

  # 2. 前端代理與儀表板 (Express)
  - type: web
    name: detective-frontend
    runtime: node
    plan: free
    region: singapore
    rootDir: frontend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: BACKEND_API_BASE_URL
        value: https://mirage-sentinel.onrender.com/api/v1/dashboard
      - key: API_KEY
        sync: false

  # 3. 狀態記憶庫 (Redis)
  - type: redis
    name: sentinel-cache
    plan: free
    region: singapore
    ipAllowList: [] # 允許所有內部連線
