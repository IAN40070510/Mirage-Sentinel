<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cyber Security Monitoring Dashboard</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="./main.js" defer></script>
</head>
<body data-layout-mode="layout-17">
  <div class="screen">
    <div class="glow"></div>
    <div class="stream-layer" id="streamLayer"></div>

    <div class="hud">
      <div class="hud-left">
        <div class="hud-box" style="padding: 1rem;">THREAT STREAM / LIVE MONITORING</div>

        <!-- DISPLAY MODE 自動化，移除選單 -->
        <div class="hud-box layout-box layout-box-pro" id="autoLayoutModeInfo" style="display:none;"></div>
      </body>
      <script>
      // 自動根據螢幕寬度設定 layout
      function autoSetLayoutMode() {
        const w = window.innerWidth;
        let mode = "layout-17";
        if (w < 1200) mode = "layout-15";
        if (w > 2000) mode = "layout-25";
        document.body.setAttribute("data-layout-mode", mode);
      }
      window.addEventListener("resize", autoSetLayoutMode);
      window.addEventListener("DOMContentLoaded", autoSetLayoutMode);
      </script>
      </body>
      <style>
        .layout-box-pro { display: none !important; }
        @media (max-width: 900px) {
          html, body {
            min-width: 0;
            max-width: 100vw;
            overflow-x: hidden;
          }
          .screen {
            padding: 0;
            margin: 0;
            min-width: 0;
            max-width: 100vw;
          }
          .hud {
            flex-direction: column;
            align-items: stretch;
            gap: 8px;
            left: 0;
            right: 0;
            padding: 0 2vw;
          }
          .hud-left {
            flex-direction: column;
            gap: 8px;
            align-items: stretch;
          }
          .hud-box {
            padding: 0.7em 0.7em;
            font-size: 14px;
            min-width: 0;
            max-width: 100vw;
          }
          .main-window, .window, .sub-window {
            min-width: 0;
            max-width: 100vw;
            left: 0 !important;
            right: 0 !important;
            margin: 0 auto !important;
            position: static !important;
            box-shadow: none !important;
            border-radius: 10px !important;
            background: rgba(0,32,32,0.13) !important;
          }
          .main-window {
            width: 99vw !important;
            min-width: 0 !important;
            max-width: 100vw !important;
          }
          .window-header, .window-body {
            padding-left: 8px !important;
            padding-right: 8px !important;
          }
          .main-grid, .overview-card-grid {
            grid-template-columns: 1fr !important;
            gap: 8px !important;
          }
          .info-card, .analysis-card {
            min-width: 0 !important;
            font-size: 14px !important;
            padding: 0.5em 0.7em !important;
          }
          .cmd-bar {
            left: 0 !important;
            right: 0 !important;
            width: 100vw !important;
            padding: 0 2vw !important;
            border-radius: 0 !important;
            box-shadow: none !important;
          }
          #trafficLogsBtn {
            left: 8px !important;
            right: auto !important;
            bottom: 12px !important;
            padding: 0.7em 1.2em !important;
            font-size: 1.1em !important;
            border-radius: 8px !important;
            width: 95vw !important;
            max-width: 99vw !important;
            margin: 0 auto !important;
            display: block !important;
            position: fixed !important;
            z-index: 1000;
          }
          .window.sub-window.w1, .window.sub-window.w2, .window.sub-window.w3 {
            margin-top: 12px !important;
          }
          .window-header {
            font-size: 1.08em !important;
            padding-top: 0.5em !important;
            padding-bottom: 0.5em !important;
          }
          .window-dots span {
            width: 7px !important;
            height: 7px !important;
          }
          .section-title, .label {
            font-size: 1em !important;
          }
          .log-block, .log-list, .attack-list, .analysis-list {
            font-size: 13px !important;
            padding: 0.5em 0.5em !important;
            word-break: break-all;
          }
          .overview-tabs {
            display: flex;
            flex-direction: row;
            gap: 0.5em;
            margin-bottom: 0.5em;
          }
          .overview-tab {
            flex: 1 1 0;
            font-size: 1em !important;
            padding: 0.5em 0.2em !important;
            border-radius: 7px !important;
            min-width: 0;
          }
          .chart-placeholder, .analysis-chart-wrap, .pie-chart-wrap {
            min-width: 0 !important;
            max-width: 100vw !important;
            overflow-x: auto !important;
          }
          canvas {
            max-width: 95vw !important;
            height: auto !important;
          }
          .draggable {
            -webkit-user-select: none;
            user-select: none;
            touch-action: none;
          }
        }
        /* 進階手機 UX：單欄分頁顯示，避免資訊爆炸 */
        @media (max-width: 700px) {
          .window.sub-window.w1, .window.sub-window.w2, .window.sub-window.w3 {
            width: 99vw !important;
            max-width: 100vw !important;
            margin: 0 auto 12px auto !important;
            display: block !important;
            position: static !important;
          }
          .window.main-window {
            margin-top: 10px !important;
          }
          .overview-tabs {
            gap: 0.2em;
          }
          .overview-panel, .overview-panel.active {
            padding: 0.5em 0.2em !important;
          }
          .cmd-bar {
            margin-bottom: 12vw !important;
          }
        }
      </style>
      </div>

      <div class="hud-box status-box">
        <span id="statusText">尚未更新</span>
        <button id="reloadBtn" type="button" class="reload-btn">Reload</button>
      </div>
    </div>

    <!-- 主視窗 -->
    <div class="window main-window draggable" id="mainWindow">
      <div class="window-header drag-handle">
        <div class="window-title">selected ip detail</div>
        <div class="window-dots"><span></span><span></span><span></span></div>
      </div>
      <div class="window-body">
        <div class="section-title">目前選定目標</div>
        <div class="traffic-meta">
          <div>IP: <span class="strong" id="detailIp"></span></div>
          <div>Risk: <span class="strong" id="detailRisk"></span></div>
        </div>

        <div class="main-grid">
          <div class="info-card">
            <div class="label">來源地區</div>
            <div class="value" id="detailGeo"></div>
          </div>
          <div class="info-card">
            <div class="label">目前流量</div>
            <div class="value" id="detailTraffic"></div>
          </div>
          <div class="info-card">
            <div class="label">協定 / Port</div>
            <div class="value" id="detailProto"></div>
          </div>
          <div class="info-card">
            <div class="label">最近行為</div>
            <div class="value" id="detailBehavior"></div>
          </div>
        </div>

        <div class="log-block" id="detailPayload"></div>

        <div class="section-title section-gap">Fake Response</div>
        <div class="log-response"></div>

        <div class="section-title section-gap">Curl 指令</div>
        <div
          class="log-block"
          id="detailCurl"
          style="font-family: monospace; font-size: 0.85rem; background: rgba(0,0,0,0.3); padding: 0.5rem; border-radius: 3px; overflow-x: auto; white-space: pre-wrap; word-break: break-all; cursor: pointer;"
          title="點擊複製"
        ></div>

        <div class="section-title section-gap">最近紀錄</div>
        <div class="log-list" id="detailRecentLogs"></div>
      </div>
    </div>

    <!-- 左上 -->
    <div class="window sub-window draggable w1">
      <div class="window-header drag-handle">
        <div class="window-title">live ip traffic</div>
        <div class="window-dots"><span></span><span></span><span></span></div>
      </div>
      <div class="window-body fixed-window-body">
        <div class="section-title">資料庫全部 IP</div>
        <div class="ip-list" id="ipTrafficList"></div>
      </div>
    </div>

    <!-- 攔截流量紀錄按鈕 -->
    <button id="trafficLogsBtn" style="position:fixed;bottom:32px;left:32px;z-index:1000;padding:0.7em 1.5em;background:#003c3c;color:#00ffa2;border:2px solid #1affb2;border-radius:8px;font-size:1.1em;font-weight:bold;box-shadow:0 2px 12px #000a;cursor:pointer;">攔截流量紀錄 &rarr;</button>

    <!-- 右側 -->
    <div class="window sub-window draggable w2">
      <div class="window-header drag-handle">
        <div class="window-title">traffic overview</div>
        <div class="window-dots"><span></span><span></span><span></span></div>
      </div>
      <div class="window-body fixed-window-body traffic-overview-body">
        <div class="overview-tabs" id="overviewTabs">
          <button class="overview-tab active" type="button" data-panel="overview-panel-traffic">流量總覽</button>
          <button class="overview-tab" type="button" data-panel="overview-panel-placeholder">惡意分析</button>
        </div>

        <div class="overview-panel active" id="overview-panel-traffic">
          <div class="traffic-meta">
            <div>Normal: <span id="normalPercent"></span></div>
            <div>Attack: <span id="attackPercent"></span></div>
          </div>

          <div class="chart-placeholder">
            <canvas id="trafficChart" width="180" height="180"></canvas>
            <div class="chart-placeholder-text">正常 / 攻擊流量</div>
          </div>

          <div class="overview-card-grid">
            <div class="info-card">
              <div class="label">正常流量</div>
              <div class="value" id="trafficNormalCount"></div>
            </div>
            <div class="info-card">
              <div class="label">攻擊流量</div>
              <div class="value" id="trafficAttackCount"></div>
            </div>
            <div class="info-card">
              <div class="label">正常比率</div>
              <div class="value" id="trafficNormalRatio"></div>
            </div>
            <div class="info-card">
              <div class="label">攻擊比率</div>
              <div class="value" id="trafficAttackRatio"></div>
            </div>
          </div>

          <div class="log-block" id="trafficSummary"></div>
        </div>

        <div class="overview-panel" id="overview-panel-placeholder">
          <div class="section-title">群體惡意分析</div>

          <div class="analysis-stack">
            <div class="info-card analysis-card">
              <div class="label">主要攻擊手段</div>
              <div class="analysis-chart-wrap tall-chart">
                <canvas id="attackMethodRankChart"></canvas>
                <div id="attackMethodEmpty" class="analysis-empty"></div>
              </div>
            </div>

            <div class="info-card analysis-card">
              <div class="label">惡意國家攻擊來源</div>
              <div class="analysis-chart-wrap pie-chart-wrap">
                <canvas id="countryPieChart"></canvas>
                <div id="countryPieEmpty" class="analysis-empty"></div>
              </div>
            </div>

            <div class="info-card analysis-card">
              <div class="label">目前被蜜罐對象列表</div>
              <div id="honeypotTargetList" class="analysis-list"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 左下 -->
    <div class="window sub-window draggable w3">
      <div class="window-header drag-handle">
        <div class="window-title">top 10 attack methods</div>
        <div class="window-dots"><span></span><span></span><span></span></div>
      </div>
      <div class="window-body fixed-window-body">
        <div class="attack-list" id="attackMethodList"></div>
      </div>
    </div>

    <!-- <div class="window sub-window draggable w4">
      <div class="window-header drag-handle">
        <div class="window-title">live log</div>
        <div class="window-dots"><span></span><span></span><span></span></div>
      </div>
      <div class="window-body fixed-window-body">
        <div class="log-list">
          <div class="log-item"><span class="log-time">proxy</span>server.js 代理後端 Dashboard API，避免前端直接暴露 API key。</div>
          <div class="log-item"><span class="log-time">api</span>main.js 透過 /api/dashboard/* 同源路由取得資料。</div>
          <div class="log-item"><span class="log-time">safe</span>指令框目前只會送到 terminal_cmd，service 不會直接執行系統命令。</div>
        </div>
      </div>
    </div> -->

    <!-- 指令輸入 -->
    <div class="cmd-bar">
      <div class="cmd-top">command input</div>
      <div class="cmd-input-wrap">
        <span class="cmd-prefix">root@matrix:~$</span>
        <input
          id="commandInput"
          class="cmd-input"
          type="text"
          placeholder="輸入內容會送往 /api/dashboard/terminal_cmd"
        />
        <button id="commandSendBtn" class="cmd-btn" type="button">EXEC</button>
      </div>
    </div>
  </div>
</body>
</html>
