<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>攔截流量紀錄 - Mirage Sentinel</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="./main.js" defer></script>
  <style>
    /* 僅保留視窗、header、返回按鈕等必要樣式，攔截紀錄列表與卡片交由 style.css 控制 */
    html, body {
      height: 100%; width: 100%; min-height: 100%; min-width: 100%;
      overflow: hidden;
      background: #10181c;
      color: #e6faff;
      font-family: 'JetBrains Mono', 'Menlo', 'Consolas', 'monospace', 'Microsoft JhengHei', 'PingFang TC', 'sans-serif';
    }
    .traffic-logs-outer {
      width: 100vw; height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: none;
      position: relative;
      z-index: 1;
    }
    .traffic-logs-window {
      border-radius: 16px;
      box-shadow: 0 8px 32px #0008, 0 1.5px 4px rgba(255,255,255,0.18);
      border: 1.5px solid #222b33;
      background: #1a222a;
      width: 98vw; max-width: 900px; min-width: 0;
      margin: 0 auto;
      display: flex; flex-direction: column;
      min-height: 70vh; max-height: 92vh;
      overflow: hidden;
      transition: box-shadow 0.18s;
    }
    .traffic-logs-header {
      border-radius: 16px 16px 0 0;
      background: #232b33;
      border-bottom: 1.5px solid #222b33;
      display: flex; align-items: center; justify-content: center;
      position: relative; gap: 0;
      padding: 18px 24px 10px 24px;
    }
    .window-title {
      flex: 1;
      text-align: center;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #e6faff;
    }
    .window-dots {
      position: absolute;
      left: 18px; top: 50%; transform: translateY(-50%);
      display: flex; gap: 7px;
    }
    .window-dots span {
      width: 11px; height: 11px; border-radius: 50%; display: inline-block;
    }
    .window-dots span:nth-child(1) { background: #ff5f57; border: 1.5px solid #e0443e; }
    .window-dots span:nth-child(2) { background: #febc2e; border: 1.5px solid #dea123; }
    .window-dots span:nth-child(3) { background: #28c840; border: 1.5px solid #1aaf29; }
    .back-link {
      border-radius: 14px;
      box-shadow: 0 2px 12px #0006;
      background: #232b33;
      border: 1.5px solid #222b33;
      color: #e6faff;
      font-weight: 600;
      letter-spacing: 0.04em;
      transition: background 0.2s, color 0.2s;
      text-decoration: none;
      font-size: 1em;
      padding: 0.38em 1.2em;
      margin-left: 12px;
    }
    .back-link:hover {
      background: #ffffff;
      color: #1a222a;
      border-color: #ffffff;
    }
    .traffic-logs-body {
      flex: 1 1 auto;
      width: 100%;
      padding: 18px 18px 12px 18px;
      display: flex; flex-direction: column;
      height: 100%;
      background: none;
    }
    @media (max-width: 600px) {
      .traffic-logs-outer { align-items: stretch; justify-content: stretch; }
      .traffic-logs-window { max-width: 100vw; width: 100vw; margin: 0; border-radius: 0; min-height: 100vh; max-height: 100vh; box-shadow: none; border: none; }
      .traffic-logs-header { padding: 14px 8px 8px 8px; }
      .traffic-logs-body { padding: 10px 2px; }
    }
  </style>
</head>
<body>
  <!-- Matrix 字母雨背景層（同步 index.html）-->
  <canvas id="matrixCanvas" style="position:fixed;inset:0;z-index:0;pointer-events:none;opacity:1;background:#000;"></canvas>
  <div class="traffic-logs-outer">
    <div class="traffic-logs-window window">
      <div class="traffic-logs-header window-header">
        <div class="window-dots"><span></span><span></span><span></span></div>
        <div class="window-title">攔截流量紀錄</div>
        <a href="./index.html" class="back-link">返回主頁</a>
      </div>
      <div class="traffic-logs-body window-body">
        <div class="traffic-logs-list" id="recentTrafficList"></div>
      </div>
    </div>
  </div>

</body>
</html>

<!-- Matrix 字母雨動畫腳本（與 index.html 完全同步）-->
<script>
// Matrix 字母雨動畫
window.addEventListener('DOMContentLoaded', function() {
  const canvas = document.getElementById('matrixCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  // 黑色背景
  canvas.style.background = '#000';
  // 指令字串
  const charList = [
    'nmap', 'sqlmap', 'hydra', 'curl', 'wget', 'nc', 'ssh', 'ftp', 'telnet',
    'GET', 'POST', 'HEAD', 'PUT', 'DELETE', 'CONNECT', 'OPTIONS',
    'admin', 'root', 'passwd', 'shadow', 'exploit', 'payload', 'inject',
    'DROP', 'SELECT', 'UNION', 'OR', 'AND', '1=1', 'sleep', 'benchmark',
    'cmd', 'powershell', 'bash', 'sh', 'python', 'php', 'perl',
    'user', 'login', 'session', 'cookie', 'token', 'csrf', 'xss', 'sqli',
    'scan', 'proxy', 'reverse', 'bind', 'shell', 'exec', 'eval', 'system',
    '127.0.0.1', 'localhost', '/etc/passwd', '/bin/sh', '/bin/bash',
    '--user', '--password', '--data', '--cookie', '--url', '--proxy',
    'alert', 'document', 'window', 'location', 'script', 'onerror',
    'drop', 'table', 'from', 'where', 'insert', 'update', 'delete',
    'union', 'select', 'information_schema', 'sleep', 'benchmark',
    'xp_cmdshell', 'exec', 'sp_', '0x', '0b', '0x1', '0x2', '0x3',
    'ping', 'whoami', 'id', 'ifconfig', 'netstat', 'cat', 'ls', 'dir',
    'rm', 'mv', 'cp', 'chmod', 'chown', 'sudo', 'su', 'passwd',
    'echo', 'export', 'set', 'env', 'history', 'clear', 'exit',
    'hack', 'attack', 'bypass', 'tunnel', 'brute', 'force', 'fuzz',
    'malware', 'virus', 'trojan', 'ransom', 'phish', 'botnet', 'ddos',
    'CVE', 'exploit', 'overflow', 'buffer', 'heap', 'stack', 'segfault',
    '0day', 'poc', 'exp', 'scan', 'enum', 'recon', 'footprint',
    'firewall', 'ids', 'ips', 'waf', 'honeypot', 'sentinel', 'mirage',
    'tcp', 'udp', 'icmp', 'dns', 'http', 'https', 'ssl', 'tls',
    'base64', 'decode', 'encode', 'inject', 'payload', 'reverse', 'bind',
    'cmd.exe', 'powershell.exe', 'bash.exe', 'python3', 'perl', 'php',
    'msf', 'metasploit', 'cobalt', 'strike', 'empire', 'beacon',
    'scan', 'fuzz', 'brute', 'force', 'enum', 'exploit', 'payload',
    'root', 'admin', 'guest', 'test', 'user', 'sys', 'service', 'daemon',
    'tmp', 'var', 'log', 'conf', 'bak', 'old', 'new', 'backup',
    'session', 'cookie', 'token', 'csrf', 'xss', 'sqli', 'rce', 'lfi', 'rfi',
    'xxe', 'ssrf', 'ssti', 'deserialization', 'injection', 'bypass',
    'auth', 'jwt', 'oauth', 'saml', 'ldap', 'kerberos', 'ntlm',
    'hash', 'md5', 'sha1', 'sha256', 'bcrypt', 'salt', 'key', 'cert',
    'public', 'private', 'rsa', 'ecc', 'aes', 'des', 'cbc', 'gcm',
    'nonce', 'iv', 'mac', 'hmac', 'sign', 'verify', 'encrypt', 'decrypt',
    'for', 'while', 'if', 'else', 'try', 'catch', 'throw', 'return',
    'import', 'require', 'include', 'open', 'read', 'write', 'close',
    'connect', 'send', 'recv', 'listen', 'accept', 'bind', 'fork', 'exec',
    'thread', 'process', 'fork', 'wait', 'kill', 'signal', 'alarm',
    'sleep', 'timeout', 'delay', 'wait', 'poll', 'select', 'epoll',
    'overflow', 'underflow', 'segfault', 'crash', 'panic', 'fail', 'error',
    'trace', 'debug', 'info', 'warn', 'error', 'fatal', 'log',
    'audit', 'monitor', 'alert', 'incident', 'response', 'forensic',
    'sandbox', 'isolate', 'quarantine', 'block', 'drop', 'allow', 'accept',
    'honeypot', 'sentinel', 'mirage', 'decoy', 'trap', 'tarpit',
    'scan', 'probe', 'fingerprint', 'banner', 'service', 'os', 'version',
    'exploit', 'payload', 'shell', 'meterpreter', 'reverse', 'bind',
    'c2', 'c&c', 'beacon', 'implant', 'dropper', 'loader', 'packer',
    'obfuscate', 'encode', 'decode', 'encrypt', 'decrypt', 'compress',
    'unpack', 'inject', 'hook', 'patch', 'bypass', 'evade', 'hide',
    'persist', 'escalate', 'privesc', 'lateral', 'move', 'pivot',
    'exfil', 'steal', 'dump', 'harvest', 'sniff', 'spoof', 'relay',
    'scan', 'brute', 'fuzz', 'enum', 'exploit', 'payload', 'shell',
    'root', 'admin', 'user', 'guest', 'test', 'sys', 'service', 'daemon',
    'tmp', 'var', 'log', 'conf', 'bak', 'old', 'new', 'backup',
  ];
  const fontSize = 12;
  let columns, drops;
  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    columns = Math.floor(canvas.width / fontSize);
    drops = Array(columns).fill(1);
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();
  function drawMatrix() {
    // 背景殘影：rgba(0,0,0,0.2) 代表黑色、透明度 0.2，數值越低殘影越淡，越高越明顯
    ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; // 字母雨軌跡殘影強度
    ctx.fillRect(0, 0, canvas.width, canvas.height); // 填滿整個畫布
    // 字型設定：fontSize 控制字母大小與間距
    ctx.font = `bold ${fontSize}px monospace`;
    // 主迴圈：每一個 column（雨滴）
    for(let i = 0; i < drops.length; i++) {
      // 隨機挑一個字串
      const text = charList[Math.floor(Math.random() * charList.length)];
      // 透明度，1.0 為完全不透明
      ctx.globalAlpha = 1.0;
      // 字母顏色，調整這裡可改變字母主色
      ctx.fillStyle = '#62febd'; // 亮綠色
      // 字母光暈顏色與強度，shadowBlur 越大越亮、越模糊
      ctx.shadowColor = '#0c2319'; // 綠色光暈
      ctx.shadowBlur = 18; // 光暈強度
      // 實際繪製字母
      ctx.fillText(text, i * fontSize, drops[i] * fontSize);
      // 若雨滴超出畫布底部，機率性重置回頂端
      if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
        drops[i] = 0;
      }
      // 雨滴往下移動
      drops[i]++;
    }
  }
  setInterval(drawMatrix, 60);
});
</script>
</html>
