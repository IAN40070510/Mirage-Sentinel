version: '3.8'

services:
  app:
    build: .
    container_name: mirage_sentinel_app
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      - sandbox

  sandbox:
    build: .
    container_name: mirage_sentinel_sandbox
    ports:
      - "8001:8001"
    volumes:
      - .:/app
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    command: ["python", "sandbox_service.py"]

