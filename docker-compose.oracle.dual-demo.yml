version: "3.8"

services:
  sandbox:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mirage_sentinel_sandbox
    restart: unless-stopped
    ports:
      - "8001:8001"
    command: ["python", "sandbox_service.py"]
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=8001
    volumes:
      - ./data:/app/data

  backend_public:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mirage_sentinel_backend_public
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env.oracle.public
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=8000
      - SANDBOX_API_URL=http://sandbox:8001/simulate_attack
    volumes:
      - ./data:/app/data
    depends_on:
      - sandbox

  backend_soc:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mirage_sentinel_backend_soc
    restart: unless-stopped
    ports:
      - "8002:8000"
    env_file:
      - .env.oracle.soc
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=8000
      - SANDBOX_API_URL=http://sandbox:8001/simulate_attack
    volumes:
      - ./data:/app/data
    depends_on:
      - sandbox

  frontend_soc:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mirage_sentinel_frontend_soc
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.oracle.soc
    environment:
      - PORT=3000
      - BACKEND_API_BASE_URL=http://backend_soc:8000/api/v1/dashboard
    depends_on:
      - backend_soc
