version: "3.8"

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: mirage_sentinel_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/dual-demo.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend_public:
        condition: service_started
      backend_soc:
        condition: service_started
      vuln_bank:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: mirage_sentinel_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=mirage_sentinel
      - POSTGRES_USER=mirage_user
      - POSTGRES_PASSWORD=mirage_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mirage_user -d mirage_sentinel"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: mirage_sentinel_redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    expose:
      - "6379"

  sandbox:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mirage_sentinel_sandbox
    restart: unless-stopped
    expose:
      - "8001"
    user: "1000:1000"
    read_only: true
    privileged: false
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    command: ["python", "sandbox_service.py"]
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - PORT=8001
    volumes:
      - ./data:/app/data

  vuln_bank_db:
    image: postgres:16-alpine
    container_name: mirage_sentinel_vuln_bank_db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=vulnerable_bank
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - vuln_bank_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vulnerable_bank"]
      interval: 5s
      timeout: 5s
      retries: 20

  vuln_bank:
    build:
      context: ./vuln-bank-main
      dockerfile: Dockerfile
    container_name: mirage_sentinel_vuln_bank
    restart: unless-stopped
    environment:
      - DB_NAME=vulnerable_bank
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=vuln_bank_db
      - DB_PORT=5432
      - DEEPSEEK_API_KEY=
    volumes:
      - ./vuln-bank-main/static/uploads:/app/static/uploads
    depends_on:
      vuln_bank_db:
        condition: service_healthy

  backend_public:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mirage_sentinel_backend_public
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env.oracle.public
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=8000
      - ENABLE_DASHBOARD=false
      - DASHBOARD_INTERNAL_ONLY=true
      - SANDBOX_API_URL=http://sandbox:8001/simulate_attack
      - VULN_BANK_BASE_URL=http://vuln_bank:5000
      - REDIS_URL=redis://redis:6379/0
      - DB_INIT_RETRIES=90
      - DB_INIT_RETRY_INTERVAL=2
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      vuln_bank:
        condition: service_started
      sandbox:
        condition: service_started
      redis:
        condition: service_started

  backend_soc:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mirage_sentinel_backend_soc
    restart: unless-stopped
    ports:
      - "127.0.0.1:8002:8000"
    env_file:
      - .env.oracle.soc
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=8000
      - ENABLE_DASHBOARD=true
      - DASHBOARD_INTERNAL_ONLY=true
      - SANDBOX_API_URL=http://sandbox:8001/simulate_attack
      - VULN_BANK_BASE_URL=http://vuln_bank:5000
      - REDIS_URL=redis://redis:6379/0
      - DB_INIT_RETRIES=90
      - DB_INIT_RETRY_INTERVAL=2
    command: uvicorn services.dashboard_service:app --host 0.0.0.0 --port 8000
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      vuln_bank:
        condition: service_started
      sandbox:
        condition: service_started
      redis:
        condition: service_started

  frontend_soc:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mirage_sentinel_frontend_soc
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.oracle.soc
    environment:
      - PORT=3000
      - BACKEND_API_BASE_URL=http://backend_soc:8000/api/v1/dashboard
    command: ["node", "soc-server.js"]
    depends_on:
      backend_soc:
        condition: service_started

  # Demo-only UI entrypoint: customer frontend is exposed only through the demo-ui profile.
  frontend_customer:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mirage_sentinel_frontend_customer
    restart: unless-stopped
    profiles:
      - demo-ui
    ports:
      - "127.0.0.1:3001:3001"
    env_file:
      - .env.oracle.public
    environment:
      - PORT=3001
      - BANKING_API_BASE_URL=http://backend_public:8000/api/v1/banking
    command: ["node", "customer-server.js"]
    depends_on:
      backend_public:
        condition: service_started

volumes:
  pgdata:
  vuln_bank_pgdata:
