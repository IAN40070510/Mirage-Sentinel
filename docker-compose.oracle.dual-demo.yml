version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: mirage_sentinel_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=mirage_sentinel
      - POSTGRES_USER=mirage_user
      - POSTGRES_PASSWORD=mirage_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mirage_user -d mirage_sentinel"]
      interval: 5s
      timeout: 5s
      retries: 20

  sandbox:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mirage_sentinel_sandbox
    restart: unless-stopped
    ports:
      - "8001:8001"
    command: ["python", "sandbox_service.py"]
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=8001
    volumes:
      - ./data:/app/data

  backend_public:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mirage_sentinel_backend_public
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env.oracle.public
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=8000
      - ENABLE_DASHBOARD=false
      - DASHBOARD_INTERNAL_ONLY=true
      - SANDBOX_API_URL=http://sandbox:8001/simulate_attack
    volumes:
      - ./data:/app/data
    depends_on:
      - postgres
      - sandbox

  backend_soc:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mirage_sentinel_backend_soc
    restart: unless-stopped
    ports:
      - "8002:8000"
    env_file:
      - .env.oracle.soc
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=8000
      - ENABLE_DASHBOARD=true
      - DASHBOARD_INTERNAL_ONLY=true
      - SANDBOX_API_URL=http://sandbox:8001/simulate_attack
    volumes:
      - ./data:/app/data
    depends_on:
      - postgres
      - sandbox

  frontend_soc:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mirage_sentinel_frontend_soc
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.oracle.soc
    environment:
      - PORT=3000
      - BACKEND_API_BASE_URL=http://backend_soc:8000/api/v1/dashboard
    depends_on:
      - backend_soc

volumes:
  pgdata:
