name: Deploy to Oracle Cloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to OCI
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          port: ${{ secrets.OCI_PORT }}
          script: |
            set -euo pipefail
            cd ~/Mirage-Sentinel

            if docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="sudo docker compose"
            elif docker-compose version >/dev/null 2>&1; then
              COMPOSE_CMD="sudo docker-compose"
            else
              echo "[deploy] ERROR: docker compose/docker-compose not found"
              exit 1
            fi

            git pull --ff-only origin main
            if [ ! -f "vuln-bank-main/Dockerfile" ]; then
              echo "[deploy] ERROR: vuln-bank source not found at vuln-bank-main"
              exit 1
            fi
            runtime_env_file=".env.runtime"
            runtime_api_key=""
            if [ -f "$runtime_env_file" ]; then
              runtime_api_key="$(grep '^API_KEY=' "$runtime_env_file" | head -n 1 | cut -d '=' -f2-)"
            fi
            case "$runtime_api_key" in
              ""|CHANGE_ME_REQUIRED|replace-with-strong-random-key|dev-local-api-key-change-me)
                runtime_api_key="$(openssl rand -hex 32)"
                ;;
            esac
            umask 077
            printf 'API_KEY=%s\n' "$runtime_api_key" > "$runtime_env_file"
            export API_KEY="$runtime_api_key"
            $COMPOSE_CMD --profile demo-ui --env-file "$runtime_env_file" -f docker-compose.oracle.dual-demo.yml down
            $COMPOSE_CMD --profile demo-ui --env-file "$runtime_env_file" -f docker-compose.oracle.dual-demo.yml up -d --build --remove-orphans

            # Mirage gate (Oracle): ensure ollama service is reachable and configured model exists.
            ollama_model="$(grep '^MIRAGE_OLLAMA_MODEL=' .env.oracle.public | cut -d '=' -f2- | tr -d '\r')"
            if [ -z "$ollama_model" ]; then
              echo "[deploy] ERROR: MIRAGE_OLLAMA_MODEL not set in .env.oracle.public"
              exit 1
            fi
            echo "[deploy] ensure ollama model exists: $ollama_model"
            $COMPOSE_CMD --profile demo-ui --env-file "$runtime_env_file" -f docker-compose.oracle.dual-demo.yml exec -T ollama \
              ollama pull "$ollama_model"

            # Verify Mirage generation path inside backend_public container (not local machine).
            mirage_ok=0
            for i in $(seq 1 3); do
              echo "[deploy] mirage probe attempt: $i"
              if $COMPOSE_CMD --profile demo-ui --env-file "$runtime_env_file" -f docker-compose.oracle.dual-demo.yml exec -T backend_public \
                python -c "import json; from core.mirage import generate_fake_data; r = generate_fake_data('oracle_probe','/register','sqli'); print(json.dumps(r, ensure_ascii=False) if r else 'MIRAGE_NONE'); raise SystemExit(0 if r else 1)"; then
                mirage_ok=1
                break
              fi
            done
            if [ "$mirage_ok" -ne 1 ]; then
              echo "[deploy] ERROR: Mirage probe failed after retries"
              $COMPOSE_CMD --profile demo-ui --env-file "$runtime_env_file" -f docker-compose.oracle.dual-demo.yml logs --tail=120 backend_public ollama
              exit 1
            fi

            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:8000/healthz >/dev/null 2>&1; then
                echo "[deploy] banking proxy gate passed"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "[deploy] ERROR: banking proxy gate failed"
                $COMPOSE_CMD --profile demo-ui --env-file "$runtime_env_file" -f docker-compose.oracle.dual-demo.yml ps
                $COMPOSE_CMD --profile demo-ui --env-file "$runtime_env_file" -f docker-compose.oracle.dual-demo.yml logs --tail=120 backend_public vuln_bank vuln_bank_db
                exit 1
              fi
              sleep 3
            done

            # Deploy gate: both public and SOC backends must become healthy.
            for i in $(seq 1 30); do
              pub_ok=0
              soc_ok=0
              if curl -fsS http://127.0.0.1:8000/healthz >/dev/null 2>&1; then
                pub_ok=1
              fi
              if curl -fsS http://127.0.0.1:8002/healthz >/dev/null 2>&1; then
                soc_ok=1
              fi
              if [ "$pub_ok" -eq 1 ] && [ "$soc_ok" -eq 1 ]; then
                echo "[deploy] health checks passed"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "[deploy] ERROR: health checks failed"
                $COMPOSE_CMD --profile demo-ui --env-file "$runtime_env_file" -f docker-compose.oracle.dual-demo.yml ps
                $COMPOSE_CMD --profile demo-ui --env-file "$runtime_env_file" -f docker-compose.oracle.dual-demo.yml logs --tail=120 backend_public backend_soc sandbox
                exit 1
              fi
              sleep 3
            done

            # Frontend services must also be reachable after the compose update.
            for i in $(seq 1 30); do
              soc_frontend_ok=0
              customer_frontend_ok=0
              if curl -fsS http://127.0.0.1:3000/ >/dev/null 2>&1; then
                soc_frontend_ok=1
              fi
              if curl -fsS http://127.0.0.1:3001/banking_demo.html >/dev/null 2>&1; then
                customer_frontend_ok=1
              fi
              if [ "$soc_frontend_ok" -eq 1 ] && [ "$customer_frontend_ok" -eq 1 ]; then
                echo "[deploy] frontend checks passed"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "[deploy] ERROR: frontend checks failed"
                $COMPOSE_CMD --profile demo-ui --env-file "$runtime_env_file" -f docker-compose.oracle.dual-demo.yml ps
                $COMPOSE_CMD --profile demo-ui --env-file "$runtime_env_file" -f docker-compose.oracle.dual-demo.yml logs --tail=120 backend_public backend_soc frontend_soc frontend_customer sandbox
                exit 1
              fi
              sleep 3
            done

            # 強制讓 backend 在 postgres 已健康後重新初始化，避免啟動時短暫失敗而停在 mock mode。
            $COMPOSE_CMD --profile demo-ui --env-file "$runtime_env_file" -f docker-compose.oracle.dual-demo.yml restart backend_public backend_soc
            $COMPOSE_CMD --profile demo-ui --env-file "$runtime_env_file" -f docker-compose.oracle.dual-demo.yml restart frontend_soc frontend_customer

            for i in $(seq 1 30); do
              pub_ok=0
              soc_ok=0
              if curl -fsS http://127.0.0.1:8000/healthz >/dev/null 2>&1; then
                pub_ok=1
              fi
              if curl -fsS http://127.0.0.1:8002/healthz >/dev/null 2>&1; then
                soc_ok=1
              fi
              if [ "$pub_ok" -eq 1 ] && [ "$soc_ok" -eq 1 ]; then
                echo "[deploy] backend restart health checks passed"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "[deploy] ERROR: backend restart health checks failed"
                $COMPOSE_CMD --profile demo-ui --env-file "$runtime_env_file" -f docker-compose.oracle.dual-demo.yml ps
                $COMPOSE_CMD --profile demo-ui --env-file "$runtime_env_file" -f docker-compose.oracle.dual-demo.yml logs --tail=120 backend_public backend_soc sandbox
                exit 1
              fi
              sleep 3
            done

            for i in $(seq 1 30); do
              soc_frontend_ok=0
              customer_frontend_ok=0
              if curl -fsS http://127.0.0.1:3000/ >/dev/null 2>&1; then
                soc_frontend_ok=1
              fi
              if curl -fsS http://127.0.0.1:3001/banking_demo.html >/dev/null 2>&1; then
                customer_frontend_ok=1
              fi
              if [ "$soc_frontend_ok" -eq 1 ] && [ "$customer_frontend_ok" -eq 1 ]; then
                echo "[deploy] frontend restart checks passed"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "[deploy] ERROR: frontend restart checks failed"
                $COMPOSE_CMD --profile demo-ui --env-file "$runtime_env_file" -f docker-compose.oracle.dual-demo.yml ps
                $COMPOSE_CMD --profile demo-ui --env-file "$runtime_env_file" -f docker-compose.oracle.dual-demo.yml logs --tail=120 frontend_soc frontend_customer
                exit 1
              fi
              sleep 3
            done

            # Optional: bulk seed banking users/accounts when helper script exists.
            # The core demo seed still runs in app startup via seed_banking_demo_data().
            if [ -f "scripts/seed_banking_users.py" ]; then
              $COMPOSE_CMD --profile demo-ui --env-file "$runtime_env_file" -f docker-compose.oracle.dual-demo.yml exec -T backend_public \
                python scripts/seed_banking_users.py --start 1 --end 10000 --batch-size 1000 --archive-zip scripts/data/archive.zip
            else
              echo "[deploy] WARN: scripts/seed_banking_users.py not found; skipping bulk seed step"
            fi

            sudo docker image prune -f
