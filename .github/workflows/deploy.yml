name: Deploy to Oracle Cloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to OCI
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          port: ${{ secrets.OCI_PORT }}
          script: |
            set -euo pipefail
            cd ~/Mirage-Sentinel

            if docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="sudo docker compose"
            elif docker-compose version >/dev/null 2>&1; then
              COMPOSE_CMD="sudo docker-compose"
            else
              echo "[deploy] ERROR: docker compose/docker-compose not found"
              exit 1
            fi

            git pull --ff-only origin main
            $COMPOSE_CMD -f docker-compose.oracle.dual-demo.yml down
            $COMPOSE_CMD -f docker-compose.oracle.dual-demo.yml up -d --build --remove-orphans

            # Deploy gate: both public and SOC backends must become healthy.
            for i in $(seq 1 30); do
              pub_ok=0
              soc_ok=0
              if curl -fsS http://127.0.0.1:8000/healthz >/dev/null 2>&1; then
                pub_ok=1
              fi
              if curl -fsS http://127.0.0.1:8002/healthz >/dev/null 2>&1; then
                soc_ok=1
              fi
              if [ "$pub_ok" -eq 1 ] && [ "$soc_ok" -eq 1 ]; then
                echo "[deploy] health checks passed"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "[deploy] ERROR: health checks failed"
                $COMPOSE_CMD -f docker-compose.oracle.dual-demo.yml ps
                $COMPOSE_CMD -f docker-compose.oracle.dual-demo.yml logs --tail=120 backend_public backend_soc sandbox
                exit 1
              fi
              sleep 3
            done

            # Frontend services must also be reachable after the compose update.
            for i in $(seq 1 30); do
              soc_frontend_ok=0
              customer_frontend_ok=0
              if curl -fsS http://127.0.0.1:3000/ >/dev/null 2>&1; then
                soc_frontend_ok=1
              fi
              if curl -fsS http://127.0.0.1:3001/banking_demo.html >/dev/null 2>&1; then
                customer_frontend_ok=1
              fi
              if [ "$soc_frontend_ok" -eq 1 ] && [ "$customer_frontend_ok" -eq 1 ]; then
                echo "[deploy] frontend checks passed"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "[deploy] ERROR: frontend checks failed"
                $COMPOSE_CMD -f docker-compose.oracle.dual-demo.yml ps
                $COMPOSE_CMD -f docker-compose.oracle.dual-demo.yml logs --tail=120 backend_public backend_soc frontend_soc frontend_customer sandbox
                exit 1
              fi
              sleep 3
            done

            # 強制讓 backend 在 postgres 已健康後重新初始化，避免啟動時短暫失敗而停在 mock mode。
            $COMPOSE_CMD -f docker-compose.oracle.dual-demo.yml restart backend_public backend_soc
            $COMPOSE_CMD -f docker-compose.oracle.dual-demo.yml restart frontend_soc frontend_customer

            for i in $(seq 1 30); do
              pub_ok=0
              soc_ok=0
              if curl -fsS http://127.0.0.1:8000/healthz >/dev/null 2>&1; then
                pub_ok=1
              fi
              if curl -fsS http://127.0.0.1:8002/healthz >/dev/null 2>&1; then
                soc_ok=1
              fi
              if [ "$pub_ok" -eq 1 ] && [ "$soc_ok" -eq 1 ]; then
                echo "[deploy] backend restart health checks passed"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "[deploy] ERROR: backend restart health checks failed"
                $COMPOSE_CMD -f docker-compose.oracle.dual-demo.yml ps
                $COMPOSE_CMD -f docker-compose.oracle.dual-demo.yml logs --tail=120 backend_public backend_soc sandbox
                exit 1
              fi
              sleep 3
            done

            for i in $(seq 1 30); do
              soc_frontend_ok=0
              customer_frontend_ok=0
              if curl -fsS http://127.0.0.1:3000/ >/dev/null 2>&1; then
                soc_frontend_ok=1
              fi
              if curl -fsS http://127.0.0.1:3001/banking_demo.html >/dev/null 2>&1; then
                customer_frontend_ok=1
              fi
              if [ "$soc_frontend_ok" -eq 1 ] && [ "$customer_frontend_ok" -eq 1 ]; then
                echo "[deploy] frontend restart checks passed"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "[deploy] ERROR: frontend restart checks failed"
                $COMPOSE_CMD -f docker-compose.oracle.dual-demo.yml ps
                $COMPOSE_CMD -f docker-compose.oracle.dual-demo.yml logs --tail=120 frontend_soc frontend_customer
                exit 1
              fi
              sleep 3
            done

            # Seed banking users/accounts into PostgreSQL after services are healthy.
            # Default range can be adjusted directly here based on capacity.
            $COMPOSE_CMD -f docker-compose.oracle.dual-demo.yml exec -T backend_public \
              python scripts/seed_banking_users.py --start 1 --end 10000 --batch-size 1000 --archive-zip scripts/data/archive.zip

            sudo docker image prune -f
