name: Post-Deploy Smoke Test

on:
  workflow_run:
    workflows:
      - Deploy to Oracle Cloud
    types:
      - completed
  workflow_dispatch:

jobs:
  smoke-test:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Run post-deploy smoke checks on OCI host
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          port: ${{ secrets.OCI_PORT }}
          script: |
            set -euo pipefail
            cd ~/Mirage-Sentinel

            if docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="sudo docker compose"
            elif docker-compose version >/dev/null 2>&1; then
              COMPOSE_CMD="sudo docker-compose"
            else
              echo "[smoke] ERROR: docker compose/docker-compose not found"
              exit 1
            fi

            runtime_env_file=".env.runtime"
            if [ -f "$runtime_env_file" ]; then
              SOC_API_KEY="$(grep '^API_KEY=' "$runtime_env_file" | head -n 1 | cut -d '=' -f2-)"
              compose_env_arg="--env-file $runtime_env_file"
            else
              SOC_API_KEY="$(grep '^API_KEY=' .env.oracle.soc | cut -d '=' -f2-)"
              compose_env_arg=""
            fi

            $COMPOSE_CMD --profile demo-ui $compose_env_arg -f docker-compose.oracle.dual-demo.yml restart backend_public backend_soc
            $COMPOSE_CMD --profile demo-ui $compose_env_arg -f docker-compose.oracle.dual-demo.yml restart frontend_soc frontend_customer

            curl -fsS http://127.0.0.1/banking/ >/dev/null

            bash scripts/ci/smoke.sh \
              --health-url http://127.0.0.1:8000/healthz \
              --health-url http://127.0.0.1:8002/healthz \
              --openapi-url http://127.0.0.1:8000/openapi.json \
              --retries 30 \
              --sleep 3 \
              --compose-cmd "$COMPOSE_CMD" \
              --compose-file docker-compose.oracle.dual-demo.yml \
              --log-services "backend_public backend_soc frontend_soc frontend_customer sandbox postgres"

            # Frontend reachability checks for both public pages.
            curl -fsS http://127.0.0.1:3000/ >/dev/null
            curl -fsS http://127.0.0.1:3001/banking_demo.html >/dev/null

            echo "[smoke] Mirage-specific banking regression checks skipped during vuln-bank migration."
