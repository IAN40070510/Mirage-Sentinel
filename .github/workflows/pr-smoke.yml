name: PR Compose Smoke Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  compose-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build and start compose stack
        run: |
          set -euo pipefail
          export DATABASE_URL="postgresql+psycopg2://mirage_user:mirage_password@postgres:5432/mirage_sentinel"
          export API_KEY="ci-smoke-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          docker compose --profile db up -d --build

      - name: Run shared smoke checks
        run: |
          set -euo pipefail
          bash scripts/ci/smoke.sh \
            --health-url http://127.0.0.1:8000/healthz \
            --openapi-url http://127.0.0.1:8000/openapi.json \
            --retries 60 \
            --sleep 2 \
            --compose-cmd "docker compose" \
            --compose-file docker-compose.yml \
            --log-services "app sandbox postgres"

      - name: Show logs on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs --tail=200 app sandbox postgres || true

      - name: Tear down compose stack
        if: always()
        run: |
          docker compose down -v --remove-orphans
